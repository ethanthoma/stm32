[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-3.0",
  "Unlicense",
]
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[sources.allow-org]
github = ["verus-lang"]
